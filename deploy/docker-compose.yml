# Local/dev dependencies: Postgres + Redis.
# Run from repo root: make docker-up
# Full stack (app + deps): make docker-up-stack

services:
  postgres:
    # PostGIS bundled (geometry/geography/point column types). Plain postgres:16-alpine has no PostGIS.
    image: postgis/postgis:16-3.5
    container_name: lowcode-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ../docker/postgres/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lowcode-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    profiles: [stack]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: lowcode-database:latest
    container_name: lowcode-server
    ports:
      - "8080:8080"
    environment:
      META_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lowcode_meta
      DEFAULT_TENANT_DATA_DSN: postgresql://postgres:postgres@postgres:5432/lowcode_data
      DEFAULT_TENANT_ID: default
      REDIS_URL: redis://redis:6379/0
      CACHE_ENABLED: "true"
      HTTP_ADDR: :8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg-data:
