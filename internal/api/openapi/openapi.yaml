          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIndexesResponse"
        "400":
          $ref: "#/components/responses/Error"
    post:
      tags: [Indexes]
      summary: Create index
      operationId: createIndex
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIndexRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIndexResponse"
        "400":
          $ref: "#/components/responses/Error"

  /v1/admin/indexes/{id}:
    get:
      tags: [Indexes]
      summary: Get index by id
      operationId: getIndex
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIndexResponse"
