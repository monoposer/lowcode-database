openapi: 3.0.3
info:
  title: lowcode-database API
  description: |
    Postgres-backed low-code table service: dynamic tables, columns, rows, indexes,
    choices (PG ENUM), relations, data sources, and event sinks (HTTP webhooks).

    Event sinks use table `lc_event_sinks` (formerly `lc_webhooks`). Delivery is HTTP POST only;
    for Kafka/RabbitMQ/Redis/SQS/SNS see docs/event-delivery.md.

    **Multi-tenant:** send `X-Tenant-Id` on every request when `TENANT_MODE=multi`.
    In single-tenant mode the header is optional (default tenant from env).

    **Playground:** [lowcode-database-playground](https://github.com/monoposer/lowcode-database-playground) — AG Grid UI (separate repo).

    Errors are returned as plain text (`http.Error`), not JSON envelopes.
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local dev (see HTTP_ADDR in .env)

tags:
  - name: Platform
  - name: Types
  - name: Event Sinks
  - name: Tables
  - name: Columns
  - name: Indexes
  - name: Schema
  - name: Choices
  - name: Relations
  - name: Data sources

paths:
  /v1/admin/database/connection:
    get:
      tags: [Platform]
      summary: Get tenant database connection info (no password)
      operationId: getDatabaseConnection
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDatabaseConnectionResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/admin/tenants:
    post:
      tags: [Platform]
      summary: Provision a tenant (multi-tenant mode)
      operationId: createTenant
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTenantResponse"
        "400":
          $ref: "#/components/responses/Error"

  /v1/admin/types:
    get:
      tags: [Types]
      summary: List built-in column types
      operationId: listTypes
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTypesResponse"
        "400":
          $ref: "#/components/responses/Error"

  /v1/admin/event-sinks:
    get:
      tags: [Event Sinks]
      summary: List event sinks
      operationId: listEventSinks
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventSinksResponse"
        "400":
          $ref: "#/components/responses/Error"
    post:
      tags: [Event Sinks]
      summary: Create event sink
      operationId: createEventSink
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventSinkRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventSinkResponse"
        "400":
          $ref: "#/components/responses/Error"

  /v1/admin/event-sinks/{id}:
    patch:
      tags: [Event Sinks]
      summary: Update event sink
      operationId: updateEventSink
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventSinkRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEventSinkResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Event Sinks]
      summary: Delete event sink
      operationId: deleteEventSink
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEventSinkResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/admin/tables:
    get:
      tags: [Tables]
      summary: List tables
      operationId: listTables
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTablesResponse"
        "400":
          $ref: "#/components/responses/Error"
    post:
      tags: [Tables]
      summary: Create table
      operationId: createTable
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTableRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTableResponse"
        "400":
          $ref: "#/components/responses/Error"

  /v1/admin/tables/{id}:
    delete:
      tags: [Tables]
      summary: Delete table
      operationId: deleteTable
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTableResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/admin/tables/{id}:rename:
    post:
      tags: [Tables]
      summary: Rename table
      operationId: renameTable
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameTableBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenameTableResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/admin/tables/{tableId}/schema:
    get:
      tags: [Tables]
      summary: Get table schema (columns + indexes)
      operationId: getTableSchema
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/TableIdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableSchemaResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/data/tables/{tableId}/rows:
    get:
      tags: [Tables]
      summary: List rows (paginated)
      operationId: listRows
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/TableIdPath"
        - name: pageSize
          in: query
          schema:
            type: integer
            format: int32
          description: Also accepted as `page_size`.
        - name: pageToken
          in: query
          schema:
            type: string
          description: Also accepted as `page_token`.
        - name: expand_column_ids
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Relationship column ids to expand. Also `expandColumnIds`.
        - name: expand_paths
          in: query
          schema:
            type: string
          description: Comma-separated dot paths (e.g. `relCol.fieldCol`). Also `expandPaths`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRowsResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    post:
      tags: [Tables]
      summary: Create row
      operationId: createRow
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/TableIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRowBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRowResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/data/tables/{tableId}/rows/{rowId}:
    patch:
      tags: [Tables]
      summary: Update row
      operationId: updateRow
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/TableIdPath"
        - $ref: "#/components/parameters/RowIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRowBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRowResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Tables]
      summary: Delete row
      operationId: deleteRow
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/TableIdPath"
        - $ref: "#/components/parameters/RowIdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRowResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/data/tables/{tableId}/rows:query:
    post:
      tags: [Tables]
      summary: Query rows with filter, sort, and projection
      operationId: queryRows
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/TableIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRowsBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryRowsResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/data/tables/{tableId}/rows:bulkUpsert:
    post:
      tags: [Tables]
      summary: Bulk upsert rows
      operationId: bulkUpsertRows
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/TableIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpsertRowsBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUpsertRowsResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/data/tables/{tableId}/rows:saveGraph:
    post:
      tags: [Tables]
      summary: Save root row and nested many-relationship children in one transaction
      operationId: saveGraphRows
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/TableIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveGraphRowsBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveGraphRowsResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/data/tables/{tableId}/rows:bulkDelete:
    post:
      tags: [Tables]
      summary: Bulk delete rows
      operationId: bulkDeleteRows
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/TableIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRowsBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDeleteRowsResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/data/tables/{tableId}/rows:import:
    post:
      tags: [Tables]
      summary: Import rows (bulk insert)
      operationId: importRows
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/TableIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRowsBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRowsResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/admin/columns:
    get:
      tags: [Columns]
      summary: List columns for a table
      operationId: listColumns
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - name: table_id
          in: query
          required: true
          schema:
            type: string
          description: Logical table id.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListColumnsResponse"
        "400":
          $ref: "#/components/responses/Error"
    post:
      tags: [Columns]
      summary: Add column
      operationId: addColumn
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddColumnRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddColumnResponse"
        "400":
          $ref: "#/components/responses/Error"

  /v1/admin/columns/{id}:
    patch:
      tags: [Columns]
      summary: Update column
      operationId: updateColumn
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateColumnBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateColumnResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Columns]
      summary: Delete column
      operationId: deleteColumn
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteColumnResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/admin/indexes:
    get:
      tags: [Indexes]
      summary: List indexes for a table
      operationId: listIndexes
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - name: table_id
