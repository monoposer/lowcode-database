              schema:
                $ref: "#/components/schemas/ListChoicesResponse"
        "400":
          $ref: "#/components/responses/Error"
    post:
      tags: [Choices]
      summary: Create choice (PG ENUM)
      operationId: createChoice
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChoiceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChoiceResponse"
        "400":
          $ref: "#/components/responses/Error"

  /v1/admin/choices/{id}:
    get:
      tags: [Choices]
      summary: Get choice
      operationId: getChoice
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChoiceResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Choices]
      summary: Update choice (add enum values via label changes)
      operationId: updateChoice
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChoiceBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChoiceResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Choices]
      summary: Delete choice
      operationId: deleteChoice
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteChoiceResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/admin/relations:
    get:
      tags: [Relations]
      summary: List relations
      operationId: listRelations
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - name: table_id
          in: query
          schema:
            type: string
          description: Filter by table id (optional).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRelationsResponse"
        "400":
          $ref: "#/components/responses/Error"
    post:
      tags: [Relations]
      summary: Create relation
      operationId: createRelation
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRelationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRelationResponse"
        "400":
          $ref: "#/components/responses/Error"

  /v1/admin/relations/{id}:
    delete:
      tags: [Relations]
      summary: Delete relation
      operationId: deleteRelation
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRelationResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/admin/data-sources:
