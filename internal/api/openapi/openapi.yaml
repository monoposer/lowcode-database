  /v1/admin/data-sources/{id}:
    get:
      tags: [Data sources]
      summary: Get data source
      operationId: getDataSource
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataSourceResponse"
