          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Data sources]
      summary: Update data source
      operationId: updateDataSource
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDataSourceBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataSourceResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Data sources]
      summary: Delete data source
      operationId: deleteDataSource
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataSourceResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/data/data-sources/{id}:query:
    post:
      tags: [Data sources]
      summary: Query rows through a data source
      operationId: queryDataSource
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryDataSourceBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryDataSourceResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

components:
  parameters:
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: false
      description: |
        Tenant identifier. Required in multi-tenant mode (`TENANT_MODE=multi`) to route
        to the tenant's Postgres database. Also accepted as `X-Tenant-ID`.
      schema:
        type: string
        example: default
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    TableIdPath:
      name: tableId
      in: path
      required: true
      schema:
        type: string
    RowIdPath:
      name: rowId
      in: path
      required: true
      schema:
        type: string

  responses:
    Error:
      description: Error message (plain text from http.Error)
      content:
        text/plain:
          schema:
            type: string
            example: table_id query parameter is required

  schemas:
    Value:
      type: object
      description: Cell value union (one field set per value).
      properties:
        stringValue:
          type: string
        numberValue:
          type: number
          format: double
        boolValue:
          type: boolean
        timestampValue:
          type: string
          format: date-time
        bytesValue:
          type: string
          format: byte
        jsonValue: {}

    Row:
      type: object
      properties:
        id:
          type: string
        cells:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Value"

    Type:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        pgType:
          type: string
        config:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Table:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        schemaName:
          type: string
        tableName:
          type: string
        idType:
          type: string
          description: Logical type id of the physical row id column (from PG catalog).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Column:
      type: object
      properties:
        id:
          type: string
        tableId:
          type: string
        name:
          type: string
        typeId:
          type: string
        pgColumn:
          type: string
        isNullable:
          type: boolean
        position:
          type: integer
          format: int32
        config:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Index:
      type: object
      properties:
        id:
          type: string
        tableId:
          type: string
        name:
          type: string
        pgIndex:
          type: string
        columnIds:
          type: array
          items:
            type: string
        isUnique:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EventSink:
      type: object
      description: |
        Event subscription row in `lc_event_sinks` (formerly `lc_webhooks`).
        Delivery is HTTP POST to `targetUrl` only. For Kafka/RabbitMQ/Redis/SQS/SNS,
        point `targetUrl` at an HTTP adapter — see docs/event-delivery.md.
      properties:
        id:
          type: string
        name:
          type: string
        sink:
          type: string
          enum: [webhook]
          readOnly: true
          description: Always `webhook`; native broker drivers are not built in.
        sinkConfig:
          type: object
          additionalProperties: true
          deprecated: true
          description: Legacy; only `sinkConfig.url` used as http(s) fallback when targetUrl is empty.
        targetUrl:
          type: string
          description: Required http(s) delivery URL (direct webhook or HTTP bridge to a broker).
        tableFilter:
          type: string
        eventTypes:
          type: array
          items:
            type: string
        headers:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
        hasSecret:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateEventSinkRequest:
      type: object
      properties:
        name:
          type: string
        targetUrl:
          type: string
        tableFilter:
          type: string
        eventTypes:
          type: array
          items:
            type: string
        headers:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
        secret:
          type: string

    CreateEventSinkResponse:
      type: object
      properties:
        eventSink:
          $ref: "#/components/schemas/EventSink"

    ListEventSinksResponse:
      type: object
      properties:
        eventSinks:
          type: array
          items:
            $ref: "#/components/schemas/EventSink"

    DeleteEventSinkResponse:
      type: object

    UpdateEventSinkRequest:
      type: object
      properties:
        name:
          type: string
        targetUrl:
          type: string
        tableFilter:
          type: string
        eventTypes:
          type: array
          items:
            type: string
        headers:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
        secret:
          type: string

    UpdateEventSinkResponse:
      type: object
      properties:
        eventSink:
          $ref: "#/components/schemas/EventSink"

    CreateTenantRequest:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        dataDsn:
          type: string
        createDatabase:
          type: boolean

    CreateTenantResponse:
      type: object
      properties:
        id:
          type: string

    ListTypesResponse:
      type: object
      properties:
        types:
          type: array
          items:
            $ref: "#/components/schemas/Type"

    GetDatabaseConnectionResponse:
      type: object
      properties:
        host:
          type: string
        port:
          type: integer
          format: int32
        database:
          type: string
        user:
          type: string
        urlWithoutPassword:
          type: string
        psqlCommand:
          type: string
        passwordSourceHint:
          type: string

    CreateTableRequest:
      type: object
      properties:
        name:
          type: string
        schemaName:
          type: string
        idType:
          type: string
          description: Built-in column type id for the physical row id column (default uuid).

    CreateTableResponse:
      type: object
      properties:
        table:
          $ref: "#/components/schemas/Table"

    DeleteTableResponse:
      type: object

    ListTablesResponse:
      type: object
      properties:
        tables:
          type: array
          items:
            $ref: "#/components/schemas/Table"

    RenameTableBody:
      type: object
      properties:
        newName:
          type: string
      description: Table id is taken from the path (`/v1/admin/tables/{id}:rename`).

    RenameTableResponse:
      type: object
      properties:
        table:
          $ref: "#/components/schemas/Table"

    GetTableSchemaResponse:
      type: object
      properties:
        table:
          $ref: "#/components/schemas/Table"
        columns:
          type: array
          items:
            $ref: "#/components/schemas/Column"
        indexes:
          type: array
          items:
            $ref: "#/components/schemas/Index"

    CreateRowBody:
      type: object
      properties:
        cells:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Value"
      description: Table id is taken from the path.

    CreateRowResponse:
      type: object
      properties:
        row:
          $ref: "#/components/schemas/Row"

    UpdateRowBody:
      type: object
      properties:
        cells:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Value"
      description: Table id and row id are taken from the path.

    UpdateRowResponse:
      type: object
      properties:
        row:
          $ref: "#/components/schemas/Row"

    DeleteRowResponse:
      type: object

    ListRowsResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/Row"
        nextPageToken:
          type: string

    SortOrder:
      type: object
      properties:
        attribute:
          type: string
        sortOrder:
          type: string
          enum: [ASC, DESC]

    QueryRowsBody:
      type: object
      properties:
        filter:
          type: object
          additionalProperties: true
        sort:
          type: array
          items:
            $ref: "#/components/schemas/SortOrder"
        columnIds:
          type: array
          items:
            type: string
        pageSize:
          type: integer
          format: int32
        pageToken:
          type: string
        expandColumnIds:
          type: array
          items:
            type: string
        expandPaths:
          type: array
          items:
            type: string
      description: Table id is taken from the path.

    QueryRowsResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/Row"
        nextPageToken:
          type: string
        count:
          type: integer
          format: int32

    BulkUpsertRowItem:
      type: object
      properties:
        rowId:
          type: string
        cells:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Value"

    BulkUpsertRowsBody:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BulkUpsertRowItem"
      description: Table id is taken from the path.

    BulkUpsertRowsResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/Row"

    SaveGraphManyInput:
      type: object
      required: [data]
      properties:
        sync:
          type: string
          enum: [merge, replace]
          default: merge
          description: merge upserts only payload rows; replace also deletes siblings not in data.
        data:
          type: array
          items:
            $ref: "#/components/schemas/SaveGraphChildRow"
        rows:
          type: array
          deprecated: true
          items:
            $ref: "#/components/schemas/SaveGraphChildRow"
        deleteMissing:
          type: boolean
          deprecated: true
          description: Legacy; true maps to sync=replace.

    SaveGraphOneInput:
      type: object
      additionalProperties: true
      description: Nested one-relationship object; creates/updates related table row and sets local FK.

    SaveGraphChildRow:
      type: object
      properties:
        id:
          type: string
          description: Existing child row id; omit to insert.
        delete:
          type: boolean
          description: When true, delete this child row by id.
      additionalProperties: true
      description: Flat physical column fields, or use cells for legacy typed values.

    SaveGraphRowsBody:
      type: object
      properties:
        id:
          type: string
          description: Root row id; omit to insert.
      additionalProperties: true
      description: >
        Flat root physical columns plus relationship keys shaped by cardinality:
        many = JSON array, one = JSON object. Optional root _sync maps relationship
        names to merge|replace. Lookup column names still resolve to FK columns.

    SaveGraphRowsResponse:
      type: object
      additionalProperties: true
      description: Echo of the request with id and resolved FK fields filled in.

    BulkDeleteRowsBody:
      type: object
      properties:
        rowIds:
          type: array
          items:
            type: string
      description: Table id is taken from the path.

    BulkDeleteRowsResponse:
      type: object

    ImportRowsBody:
      type: object
      properties:
        format:
          type: integer
          format: int32
          description: "0 = unspecified, 1 = JSON rows"
          enum: [0, 1]
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        columnMap:
          type: object
          additionalProperties:
            type: string
      description: Table id is taken from the path.

    ImportRowsResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/Row"
        insertedCount:
          type: integer
          format: int32

    AddColumnRequest:
      type: object
      required: [tableId]
      properties:
        tableId:
          type: string
        name:
          type: string
        typeId:
          type: string
        isNullable:
          type: boolean
        position:
          type: integer
          format: int32
        config:
          type: object
          additionalProperties: true

    AddColumnResponse:
      type: object
      properties:
        column:
          $ref: "#/components/schemas/Column"

    UpdateColumnBody:
      type: object
      properties:
        name:
          type: string
        isNullable:
          type: boolean
          nullable: true
        position:
          type: integer
          format: int32
        config:
          type: object
          additionalProperties: true
      description: Column id is taken from the path.

    UpdateColumnResponse:
      type: object
      properties:
        column:
          $ref: "#/components/schemas/Column"

    DeleteColumnResponse:
      type: object

    ListColumnsResponse:
      type: object
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/Column"

    CreateIndexRequest:
      type: object
      properties:
        tableId:
          type: string
        name:
          type: string
        columnIds:
          type: array
          items:
            type: string
        isUnique:
          type: boolean

    CreateIndexResponse:
      type: object
      properties:
        index:
          $ref: "#/components/schemas/Index"

    GetIndexResponse:
      type: object
      properties:
        index:
          $ref: "#/components/schemas/Index"

    DeleteIndexResponse:
      type: object

    ListIndexesResponse:
      type: object
      properties:
        indexes:
          type: array
          items:
            $ref: "#/components/schemas/Index"

    ChoiceItem:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        value:
          type: string
        color:
          type: string
        order:
          type: integer
          format: int32
        parentId:
          type: string

    ChoiceSource:
      type: object
      properties:
        type:
          type: string
          description: STATIC | ENTITY
        tableId:
          type: string
        valueField:
          type: string
        labelField:
          type: string
        dataSourceId:
          type: string
        filter:
          type: object
          additionalProperties: true

    Choice:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        label:
          type: string
        schemaName:
          type: string
        pgTypeName:
          type: string
        source:
          $ref: "#/components/schemas/ChoiceSource"
        values:
          type: array
          items:
            $ref: "#/components/schemas/ChoiceItem"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateChoiceRequest:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        schemaName:
          type: string
        values:
          type: array
          items:
            $ref: "#/components/schemas/ChoiceItem"

    CreateChoiceResponse:
      type: object
      properties:
        choice:
          $ref: "#/components/schemas/Choice"

    ListChoicesResponse:
      type: object
      properties:
        choices:
          type: array
          items:
            $ref: "#/components/schemas/Choice"

    GetChoiceResponse:
      type: object
      properties:
        choice:
          $ref: "#/components/schemas/Choice"

    UpdateChoiceBody:
      type: object
      properties:
        label:
          type: string
        values:
          type: array
          items:
            $ref: "#/components/schemas/ChoiceItem"
        replaceValues:
          type: boolean
          description: When true, values is the full desired enum set (supports add/remove). When false, only appends new values.

    UpdateChoiceResponse:
      type: object
      properties:
        choice:
          $ref: "#/components/schemas/Choice"

    DeleteChoiceResponse:
      type: object

    Relation:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string
          description: ONE_TO_ONE | ONE_TO_MANY | MANY_TO_ONE
        sourceTableId:
          type: string
        sourceColumnId:
          type: string
        targetTableId:
          type: string
        targetColumnId:
          type: string
        config:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRelationRequest:
      type: object
      properties:
        name:
          type: string
        kind:
          type: string
        sourceTableId:
          type: string
        sourceColumnId:
          type: string
        targetTableId:
          type: string
        targetColumnId:
          type: string
        config:
          type: object
          additionalProperties: true

    CreateRelationResponse:
      type: object
      properties:
        relation:
          $ref: "#/components/schemas/Relation"

    ListRelationsResponse:
      type: object
      properties:
        relations:
          type: array
          items:
            $ref: "#/components/schemas/Relation"

    DeleteRelationResponse:
      type: object

    DataSource:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        label:
          type: string
        tableId:
          type: string
        filter:
          type: object
          additionalProperties: true
        sort:
          type: array
          items:
            $ref: "#/components/schemas/SortOrder"
        columnIds:
          type: array
          items:
            type: string
        config:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateDataSourceRequest:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        tableId:
          type: string
        filter:
          type: object
          additionalProperties: true
        sort:
          type: array
          items:
            $ref: "#/components/schemas/SortOrder"
        columnIds:
          type: array
          items:
            type: string
        config:
          type: object
          additionalProperties: true

    CreateDataSourceResponse:
      type: object
      properties:
        dataSource:
          $ref: "#/components/schemas/DataSource"

    ListDataSourcesResponse:
      type: object
      properties:
        dataSources:
          type: array
          items:
            $ref: "#/components/schemas/DataSource"

    GetDataSourceResponse:
      type: object
      properties:
        dataSource:
          $ref: "#/components/schemas/DataSource"

    UpdateDataSourceBody:
      type: object
      properties:
        label:
          type: string
        filter:
          type: object
          additionalProperties: true
        sort:
          type: array
          items:
            $ref: "#/components/schemas/SortOrder"
        columnIds:
          type: array
          items:
            type: string
        config:
          type: object
          additionalProperties: true
      description: Data source id is taken from the path.

    UpdateDataSourceResponse:
      type: object
      properties:
        dataSource:
          $ref: "#/components/schemas/DataSource"

    DeleteDataSourceResponse:
      type: object

    QueryDataSourceBody:
      type: object
      properties:
        pageSize:
          type: integer
          format: int32
        pageToken:
          type: string
        filter:
          type: object
          additionalProperties: true
        params:
          type: object
          additionalProperties: true
          description: Replaces `{param}` placeholders in the data source filter.
        columnIds:
          type: array
          items:
            type: string
          description: Optional subset of the data source view projection (column_names). Omitted = return all columns defined on the data source (empty column_names = SELECT *).
      description: Data source id is taken from the path.

    QueryDataSourceResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/Row"
        nextPageToken:
          type: string
        count:
          type: integer
          format: int32

    ERNode:
      type: object
      properties:
        tableId:
          type: string
        tableName:
          type: string
        label:
          type: string
        columns:
          type: array
          items:
            $ref: "#/components/schemas/Column"

    EREdge:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        sourceTableId:
          type: string
        sourceColumnId:
          type: string
        targetTableId:
          type: string
        targetColumnId:
          type: string
        label:
          type: string

    ERDiagram:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/ERNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/EREdge"

    GetERDiagramResponse:
      type: object
      properties:
        diagram:
          $ref: "#/components/schemas/ERDiagram"
