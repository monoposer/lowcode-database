      tags: [Data sources]
      summary: List data sources
      operationId: listDataSources
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - name: table_id
          in: query
          schema:
            type: string
          description: Filter by table id (optional).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataSourcesResponse"
        "400":
          $ref: "#/components/responses/Error"
    post:
      tags: [Data sources]
      summary: Create data source (saved view definition)
      operationId: createDataSource
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDataSourceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataSourceResponse"
        "400":
