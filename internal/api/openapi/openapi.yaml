      summary: Delete index
      operationId: deleteIndex
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIndexResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/admin/schema/er:
    get:
      tags: [Schema]
      summary: Get ER diagram (tables, columns, relations)
      operationId: getERDiagram
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetERDiagramResponse"
        "400":
          $ref: "#/components/responses/Error"

  /v1/admin/choices:
    get:
      tags: [Choices]
      summary: List choices (PG ENUM types)
      operationId: listChoices
      parameters:
        - $ref: "#/components/parameters/TenantIdHeader"
